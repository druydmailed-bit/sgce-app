<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGCE - Sistema de Gestão de Contratos e Entregas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="var(--neon)" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                    </svg>
                    <span>SGCE - Sistema de Gestão de Contratos e Entregas</span>
                </div>
            </div>
            <nav class="nav" id="nav">
                <a class="nav-item active" data-tab="dashboard" onclick="navigate('dashboard')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" data-tab="materiais" onclick="navigate('materiais')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>
                    <span>Materiais</span>
                </a>
                <a class="nav-item" data-tab="fornecedores" onclick="navigate('fornecedores')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                    <span>Fornecedores</span>
                </a>
                <a class="nav-item" data-tab="contratos" onclick="navigate('contratos')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                    <span>Contratos</span>
                </a>
                <a class="nav-item" data-tab="rcs" onclick="navigate('rcs')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
                    <span>Requisições (RC)</span>
                </a>
                <a class="nav-item" data-tab="entregas" onclick="navigate('entregas')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                    <span>Entregas</span>
                </a>
                <a class="nav-item" data-tab="pendencias" onclick="navigate('pendencias')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    <span>Pendências</span>
                </a>
                <a class="nav-item" data-tab="email" onclick="navigate('email')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
                    <span>E-Mail</span>
                </a>
                <a class="nav-item" data-tab="sap" onclick="navigate('sap')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    <span>SAP</span>
                </a>
            </nav>
            <div class="sidebar-backup">
                <button class="backup-btn" onclick="openInfoRapida()" style="background:rgba(var(--neon-rgb),0.08);border-color:rgba(var(--neon-rgb),0.25);color:var(--neon);margin-bottom:6px">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                    <span>Info Divisões</span>
                </button>
                <button class="backup-btn export" onclick="exportBackup()">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
                    <span>Exportar Backup</span>
                </button>
                <button class="backup-btn import" onclick="document.getElementById('importFile').click()">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
                    <span>Importar Backup</span>
                </button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBackup(event)">
            </div>
            <div class="sidebar-footer">
                <small>Elaborado por Lucas Marques</small>
            </div>
        </aside>

        <main class="main">
            <div class="main-header" id="mainHeader">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <div id="headerTitle"></div>
                <div style="flex:1"></div>
                <span id="syncStatus" style="margin-right:8px"></span>
                <button class="btn-icon" onclick="openGlobalSearch()" title="Busca Global (Ctrl+K)" style="margin-right:4px">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </button>
                <button class="btn-icon" onclick="toggleTheme()" title="Alternar Tema" id="themeToggleBtn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                </button>
            </div>
            <div class="main-content" id="content"></div>
        </main>
    </div>

    <!-- Global Search Overlay -->
    <div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeGlobalSearch()">
        <div class="search-panel">
            <div class="search-panel-header">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="var(--neon)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" id="globalSearchInput" class="search-panel-input" placeholder="Buscar em tudo... (materiais, fornecedores, contratos, RCs, entregas, pendências)" oninput="doGlobalSearch(this.value)">
                <kbd class="search-kbd">ESC</kbd>
            </div>
            <div class="search-panel-results" id="globalSearchResults">
                <div class="search-empty">Digite para buscar em todas as áreas do sistema</div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Firebase SDK (compat CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyDgs1ASU9qQ3JOA1QHfxA_jeYFw80FZRQE",
            authDomain: "sgce-app.firebaseapp.com",
            databaseURL: "https://sgce-app-default-rtdb.firebaseio.com",
            projectId: "sgce-app",
            storageBucket: "sgce-app.firebasestorage.app",
            messagingSenderId: "935711779366",
            appId: "1:935711779366:web:e88afa7bcdee75988814e7"
        });
        window.firebaseDB = firebase.database();
    </script>
    <script src="app.js"></script>
</body>
</html>
